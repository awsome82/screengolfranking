name: Update Golf Ranking

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run ranking script
        env:
          SG_ID: ${{ secrets.SG_ID }}
          SG_PW: ${{ secrets.SG_PW }}
        run: python golf_ranking.py

      - name: Generate HTML
        run: python generate_html.py

      - name: Deploy to gh-pages
        run: |
          # 생성된 파일 임시 보관
          mkdir -p /tmp/deploy
          cp index.html /tmp/deploy/index.html

          # gh-pages 브랜치 설정
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin

          # orphan 브랜치로 깨끗하게 시작
          git checkout --orphan gh-pages-new
          git rm -rf .

          # 파일 복원
          cp /tmp/deploy/index.html ./index.html

          git add index.html
          git commit -m "Update ranking $(date '+%Y-%m-%d %H:%M KST')"

          # 강제 push로 gh-pages 교체
          git push origin gh-pages-new:gh-pages --force

          echo "✅ 배포 완료"
