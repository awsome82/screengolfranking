name: Update Golf Ranking

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-update]   # 웹페이지 버튼에서 호출

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run ranking script
        env:
          SG_ID: ${{ secrets.SG_ID }}
          SG_PW: ${{ secrets.SG_PW }}
        run: python golf_ranking.py

      - name: Generate HTML
        run: python generate_html.py

      - name: Deploy to gh-pages
        run: |
          mkdir -p /tmp/deploy
          cp index.html /tmp/deploy/index.html

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin

          git checkout --orphan gh-pages-new
          git rm -rf .
          cp /tmp/deploy/index.html ./index.html

          git add index.html
          git commit -m "Update ranking $(date '+%Y-%m-%d %H:%M KST')"
          git push origin gh-pages-new:gh-pages --force
